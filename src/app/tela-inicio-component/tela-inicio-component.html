<div class="main-container p-4">
  <div class="row g-4">

    <main class="col-lg-9">
      <div class="filter-section d-flex justify-content-between align-items-center mb-4 p-3 rounded">
        <div class="d-flex gap-3">

          <div>
            <label class="form-label text-muted small fw-bold">Plataforma</label>
            <select
              class="form-select custom-select"
              [(ngModel)]="plataformaSelecionada"
              (ngModelChange)="onPlataformaChange($event)">
              <option>Todas</option>
              <option>PC</option>
              <option>PS5</option>
              <option>Xbox</option>
            </select>
          </div>

          <div>
            <label class="form-label text-muted small fw-bold">Ordenar por</label>
            <select
              class="form-select custom-select"
              [(ngModel)]="ordenacaoSelecionada"
              (ngModelChange)="onOrdenacaoChange($event)">
              <option>Mais bem avaliados</option>
              <option>Mais em conta</option>
              <option>Lançamentos</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Mensagem quando nenhum jogo bate o filtro -->
      <p *ngIf="meusJogos.length === 0" class="text-muted">
        Nenhum jogo encontrado para a plataforma selecionada.
      </p>

      <div class="row row-cols-2 row-cols-md-3 row-cols-xl-6 g-3">
        <div class="col" *ngFor="let jogo of meusJogos">
          <button type="button"
            class="card game-card h-100 border-0 position-relative text-start bg-transparent p-0 w-100"
            [routerLink]="['/jogos', jogo.id]">

            <span class="badge bg-dark position-absolute top-0 end-0 m-2 opacity-75">{{ jogo.ano }}</span>

            <img [src]="jogo.imagem" class="card-img-top rounded" [alt]="jogo.nome">

            <div class="card-body p-2 d-flex flex-column justify-content-between">
              <div>
                <h6 class="card-title text-white text-truncate mb-1 m-0">{{ jogo.nome }}</h6>
                <div class="d-flex align-items-center gap-2">
                  <p class="card-text text-muted small mb-2">{{ jogo.nota }}</p>
                  <ngb-rating [max]="5" [(rate)]="jogo.nota" [readonly]="true">
                    <ng-template let-fill="fill">
                      <span class="star-container">
                        <span class="star-empty">&#9733;</span>
                        <span class="star-filled" [style.width.%]="fill">&#9733;</span>
                      </span>
                    </ng-template>
                  </ngb-rating>
                </div>
                <div *ngIf="ordenacaoSelecionada === 'Mais em conta'" class="preco-badge">
                  {{ jogo.menorPreco === 0 ? 'Grátis' : 'R$ ' + jogo.menorPreco.toFixed(2) }}
                </div>
              </div>
            </div>

          </button>
        </div>
      </div>
    </main>

    <aside class="col-lg-3">
      <div class="sidebar-section p-3 rounded">
        <h5 class="text-white mb-3 fw-bold tracking-wide text-uppercase small" style="letter-spacing: 1px;">
          Populares Recentes
        </h5>
        <div class="d-flex flex-column gap-3">
          <div class="d-flex align-items-center justify-content-between sidebar-item"
               *ngFor="let pop of jogosPopulares">
            <div class="d-flex align-items-center gap-2">
              <img [src]="pop.imagem" class="rounded" [alt]="pop.nome"
                   style="width: 40px; height: 50px; object-fit: cover;">
              <div>
                <h6 class="text-white my-0 text-truncate" style="max-width: 150px;">{{ pop.nome }}</h6>
                <small class="text-muted d-block">Lançado: {{ pop.ano }}</small>
              </div>
            </div>
            <div class="text-end">
              <span class="text-success fw-bold d-block small">⭐ {{ pop.nota }}</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

  </div>
</div>
