<div class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-card p-4 p-md-5">

    <span class="auth-badge mb-3 d-inline-block">
      ★ Acesso à plataforma
    </span>

    <h1 class="auth-title">Entrar na conta</h1>


    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="mb-3">
        <label for="email" class="auth-label">E-mail</label>
        <input
          id="email"
          type="email"
          class="form-control auth-input"
          [class.is-invalid]="email.invalid && email.touched"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
        <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
          Informe um e-mail válido.
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="auth-label">Senha</label>
        <div class="input-group">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-control auth-input"
            [class.is-invalid]="password.invalid && password.touched"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            class="btn auth-eye-btn"
            type="button"
            (click)="togglePassword()"
            aria-label="Mostrar senha"
          >
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
          <div class="invalid-feedback" *ngIf="password.invalid && password.touched">
            A senha deve ter no mínimo 6 caracteres.
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input auth-check" type="checkbox" id="rememberMe" formControlName="rememberMe" />
          <label class="form-check-label auth-check-label" for="rememberMe">Lembrar de mim</label>
        </div>
        <a href="#" class="auth-link-small">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn auth-btn-primary w-100 mb-3">Entrar</button>
    </form>

    <p class="text-center auth-check-label mb-0">
      Não tem conta?
      <a class="auth-link" (click)="irParaCadastro()">Cadastre-se grátis</a>
    </p>

  </div>
</div>
